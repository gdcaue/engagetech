<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGAGE//Tech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #d30f00;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

.logo {
  color: white;
  font-size: clamp(36px, 8vw, 100px);
  letter-spacing: -1px;
  position: relative;
  animation: fadeIn 1.2s ease-out forwards;
}

.bold {
  font-weight: 700;
}

.thin {
  font-weight: 200;
}

.logo::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -15px;
  width: 0%;
  height: 3px;
  background: white;
  animation: line 1.4s ease forwards;
  animation-delay: 0.8s;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
    letter-spacing: 10px;
  }
  to {
    opacity: 1;
    transform: translateY(0);
    letter-spacing: -1px;
  }
}

@keyframes line {
  to {
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="logo">
  <span class="bold">ENGAGE</span><span class="thin">//Tech</span>
</div>

</body>
</html>
